<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Site Under Maintenance</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      background: #1e293b;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 0 25px rgba(0,0,0,0.6);
      max-width: 500px;
    }

    h1 {
      color: #f97316;
      font-size: 28px;
    }

    p {
      font-size: 16px;
      margin-top: 10px;
      color: #cbd5e1;
    }

    .emoji {
      font-size: 40px;
    }
  </style>
</head>
<body>

  <div class="box">
    <div class="emoji">🚧</div>
    <h1>Website Temporarily Off</h1>
    <p>Sometime ke liye website unavailable hai.</p>
    <p>Hum jaldi hi wapas online aayenge 👍</p>
  </div>

</body>
</html>
